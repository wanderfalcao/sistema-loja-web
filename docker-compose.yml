services:
  produto-db:
    image: postgres:16-alpine
    container_name: produto-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: produto_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      TZ: America/Sao_Paulo
    volumes:
      - produto_db_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d produto_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pedido-db:
    image: postgres:16-alpine
    container_name: pedido-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: pedido_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      TZ: America/Sao_Paulo
    volumes:
      - pedido_db_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d pedido_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  produto-test-db:
    image: postgres:16-alpine
    container_name: produto-test-db
    profiles: [test]
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: ${TEST_DB_USER:-test}
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:-test}
      TZ: America/Sao_Paulo
    networks:
      - test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_DB_USER:-test} -d testdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  pedido-test-db:
    image: postgres:16-alpine
    container_name: pedido-test-db
    profiles: [test]
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: ${TEST_DB_USER:-test}
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:-test}
      TZ: America/Sao_Paulo
    networks:
      - test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_DB_USER:-test} -d testdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  eureka-server:
    build:
      context: .
      dockerfile: ./eureka-server/Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  produto-service:
    build:
      context: .
      dockerfile: ./produto-service/Dockerfile
    container_name: produto-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: America/Sao_Paulo
    depends_on:
      produto-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  pedido-service:
    build:
      context: .
      dockerfile: ./pedido-service/Dockerfile
    container_name: pedido-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: America/Sao_Paulo
    depends_on:
      pedido-db:
        condition: service_healthy
      produto-service:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: America/Sao_Paulo
    depends_on:
      produto-service:
        condition: service_healthy
      pedido-service:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    profiles: [analysis]
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      TZ: America/Sao_Paulo
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/system/status | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    profiles: [tools]
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@loja.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    depends_on:
      - produto-db
      - pedido-db
    networks:
      - backend

  urls:
    image: alpine
    restart: "no"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - frontend
    entrypoint: ["sh", "-c"]
    command:
      - |
        printf '\n'
        printf '\033[1;32mв•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—\033[0m\n'
        printf '\033[1;32mв•‘            SISTEMA LOJA  вЂ”  PRONTO               в•‘\033[0m\n'
        printf '\033[1;32mв• в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•Ј\033[0m\n'
        printf '\033[1;32mв•‘\033[0m  Pedidos     \033[1;34mhttp://localhost:8080/pedidos\033[0m         \033[1;32mв•‘\033[0m\n'
        printf '\033[1;32mв•‘\033[0m  Produtos    \033[1;34mhttp://localhost:8080/produtos\033[0m        \033[1;32mв•‘\033[0m\n'
        printf '\033[1;32mв•‘\033[0m  Swagger     \033[1;34mhttp://localhost:8080/swagger-ui.html\033[0m \033[1;32mв•‘\033[0m\n'
        printf '\033[1;32mв•‘\033[0m  SonarQube   \033[1;34mhttp://localhost:9000\033[0m  (--profile analysis)\033[0m \033[1;32mв•‘\033[0m\n'
        printf '\033[1;32mв•‘\033[0m  PgAdmin     \033[1;34mhttp://localhost:5050\033[0m  (--profile tools)\033[0m    \033[1;32mв•‘\033[0m\n'
        printf '\033[1;32mв•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ\033[0m\n'
        printf '\n'

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
  test:
    driver: bridge

volumes:
  produto_db_data:
  pedido_db_data:
  sonarqube_data:
  sonarqube_logs:

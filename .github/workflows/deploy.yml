name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  PRODUTO_IMAGE: ghcr.io/${{ github.repository_owner }}/produto-service
  PEDIDO_IMAGE: ghcr.io/${{ github.repository_owner }}/pedido-service

jobs:
  # ── 1. Build e push das imagens Docker para ghcr.io ─────────────────────────
  build-and-push:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push — produto-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: produto-service/Dockerfile
          push: true
          tags: ${{ env.PRODUTO_IMAGE }}:${{ github.sha }},${{ env.PRODUTO_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e push — pedido-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: pedido-service/Dockerfile
          push: true
          tags: ${{ env.PEDIDO_IMAGE }}:${{ github.sha }},${{ env.PEDIDO_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumo das imagens publicadas
        run: |
          echo "## Imagens Docker publicadas" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.PRODUTO_IMAGE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.PEDIDO_IMAGE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "::notice title=Imagens publicadas::produto-service e pedido-service → ghcr.io (${{ github.sha }})"

  # ── 2. Deploy automático no ambiente dev ─────────────────────────────────────
  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir stack dev com imagens pré-construídas
        env:
          PRODUTO_SERVICE_IMAGE: ${{ env.PRODUTO_IMAGE }}:${{ github.sha }}
          PEDIDO_SERVICE_IMAGE: ${{ env.PEDIDO_IMAGE }}:${{ github.sha }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'postgres' }}
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
          echo "::notice title=Deploy Dev::Stack subida com imagens ${{ github.sha }}"

      - name: Aguardar serviços ficarem saudáveis (dev)
        run: |
          echo "Aguardando produto-service..."
          timeout 120 bash -c \
            'until curl -sf http://localhost:8081/actuator/health; do sleep 5; done'
          echo "Aguardando pedido-service..."
          timeout 120 bash -c \
            'until curl -sf http://localhost:8082/actuator/health; do sleep 5; done'
          echo "::notice title=Health Check Dev::Ambos os serviços respondem a /actuator/health"

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Testes Selenium pós-deploy (dev)
        run: mvn test -pl produto-service,pedido-service -Dgroups=selenium -Dspring.profiles.active=test -B
        continue-on-error: true

      - name: Upload resultados Selenium — dev
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-pos-deploy-dev
          path: '**/target/surefire-reports/'

      - name: Derrubar stack dev
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml down -v

  # ── 3. Deploy em produção (requer aprovação manual) ──────────────────────────
  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir stack prod com imagens pré-construídas
        env:
          PRODUTO_SERVICE_IMAGE: ${{ env.PRODUTO_IMAGE }}:${{ github.sha }}
          PEDIDO_SERVICE_IMAGE: ${{ env.PEDIDO_IMAGE }}:${{ github.sha }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'postgres' }}
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
          echo "::notice title=Deploy Prod::Deploy de produção iniciado — imagem ${{ github.sha }}"

      - name: Aguardar serviços ficarem saudáveis (prod)
        run: |
          timeout 120 bash -c \
            'until curl -sf http://localhost:8081/actuator/health && \
                   curl -sf http://localhost:8082/actuator/health; do sleep 5; done'
          echo "::notice title=Health Check Prod::Todos os serviços em produção respondem"

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Testes Selenium pós-deploy (prod)
        run: mvn test -pl produto-service,pedido-service -Dgroups=selenium -Dspring.profiles.active=test -B
        continue-on-error: true

      - name: Upload resultados Selenium — prod
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-pos-deploy-prod
          path: '**/target/surefire-reports/'

      - name: Resumo final do deploy
        if: always()
        run: |
          echo "## Deploy de Produção" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagem produto-service:** \`${{ env.PRODUTO_IMAGE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagem pedido-service:** \`${{ env.PEDIDO_IMAGE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Derrubar stack prod
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml down -v

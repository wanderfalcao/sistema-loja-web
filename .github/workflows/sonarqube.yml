name: SonarQube Analysis

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest

    services:
      sonarqube:
        image: sonarqube:community
        ports:
          - 9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
        options: >-
          --health-cmd "wget -qO- http://localhost:9000/api/system/status | grep -q UP || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 90s

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Aguardar SonarQube
        run: |
          echo "Verificando disponibilidade do SonarQube..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf http://localhost:9000/api/system/status \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "indisponivel")
            echo "Tentativa $i: $STATUS"
            if [ "$STATUS" = "UP" ]; then
              echo "SonarQube disponível."
              break
            fi
            sleep 10
          done
          if [ "$STATUS" != "UP" ]; then
            echo "SonarQube não inicializou a tempo." && exit 1
          fi

      - name: Criar projeto e gerar token
        id: sonar-setup
        run: |
          # Cria projeto
          curl -sf -u admin:admin -X POST \
            "http://localhost:9000/api/projects/create" \
            -d "name=sistema-loja-web&project=sistema-loja-web" || true

          # Gera token de análise
          TOKEN=$(curl -sf -u admin:admin -X POST \
            "http://localhost:9000/api/user_tokens/generate" \
            -d "name=ci-${{ github.run_id }}&type=GLOBAL_ANALYSIS_TOKEN" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Build e testes
        run: |
          mvn -B verify -pl produto-service,pedido-service \
            -Dspring.profiles.active=test

      - name: Análise SonarQube
        run: |
          mvn -B sonar:sonar \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=${{ steps.sonar-setup.outputs.token }} \
            -Dsonar.projectKey=sistema-loja-web \
            -Dsonar.exclusions="**/DataLoader.java,**/*Application.java,**/dto/**,**/mapper/**"

      - name: Resultado da análise
        run: |
          echo "Relatório disponível em: http://localhost:9000/dashboard?id=sistema-loja-web"
          curl -sf -u admin:admin \
            "http://localhost:9000/api/qualitygates/project_status?projectKey=sistema-loja-web" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          status = d.get('projectStatus', {}).get('status', 'UNKNOWN')
          print(f'Quality Gate: {status}')
          if status != 'OK':
              print(f'::error title=Quality Gate::Status={status} — build bloqueado')
              sys.exit(1)
          print('::notice title=Quality Gate::OK — todos os critérios de qualidade passaram')
          "

      - name: Resumo SonarQube
        if: always()
        run: |
          echo "## Análise de Qualidade — SonarQube" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Ferramenta** | SonarQube Community |" >> $GITHUB_STEP_SUMMARY
          echo "| **Projeto** | sistema-loja-web |" >> $GITHUB_STEP_SUMMARY
          echo "| **Cobertura mínima** | 90% (JaCoCo) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Exclusões** | DataLoader, Application, dto/\*\*, mapper/\*\* |" >> $GITHUB_STEP_SUMMARY
          echo "::notice title=SonarQube::Análise concluída — consulte o Quality Gate no log acima"

name: Code Quality

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  checkstyle:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Checkstyle
        run: mvn checkstyle:check -B

      - name: Resumo Checkstyle
        if: always()
        run: |
          echo "## Qualidade de Código — Checkstyle" >> $GITHUB_STEP_SUMMARY
          echo "| Campo         | Valor                        |" >> $GITHUB_STEP_SUMMARY
          echo "|---------------|------------------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Ferramenta** | Checkstyle (Google Style)   |" >> $GITHUB_STEP_SUMMARY
          echo "| **Escopo**     | produto-service, pedido-service |" >> $GITHUB_STEP_SUMMARY
          echo "| **Falha em**   | qualquer violação de estilo  |" >> $GITHUB_STEP_SUMMARY
          echo "::notice title=Checkstyle::Verificação de estilo concluída"

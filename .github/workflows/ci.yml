name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Testes unitários, integração e cobertura JaCoCo
  # ─────────────────────────────────────────────────────────
  testes:
    name: Testes e Cobertura
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build e testes (produto-service e pedido-service)
        run: mvn verify -B -pl produto-service,pedido-service -Dspring.profiles.active=test

      - name: Publicar resultados dos testes
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Testes JUnit
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload relatório JUnit — produto-service
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-produto-service
          path: produto-service/target/surefire-reports/

      - name: Upload relatório JUnit — pedido-service
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-pedido-service
          path: pedido-service/target/surefire-reports/

      - name: Upload JaCoCo — produto-service
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-produto-service
          path: produto-service/target/site/jacoco/

      - name: Upload JaCoCo — pedido-service
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-pedido-service
          path: pedido-service/target/site/jacoco/

      - name: Resumo de cobertura JaCoCo
        if: always()
        run: |
          echo "## Cobertura JaCoCo" >> $GITHUB_STEP_SUMMARY
          for service in produto-service pedido-service; do
            csv="$service/target/site/jacoco/jacoco.csv"
            if [ -f "$csv" ]; then
              covered=$(tail -n +2 "$csv" | awk -F',' '{s+=$5} END {print s+0}')
              missed=$(tail -n +2  "$csv" | awk -F',' '{s+=$4} END {print s+0}')
              total=$((covered + missed))
              if [ "$total" -gt 0 ]; then
                pct=$(awk "BEGIN {printf \"%.1f\", ($covered/$total)*100}")
                echo "- **$service**: $covered/$total linhas ($pct%)" >> $GITHUB_STEP_SUMMARY
                echo "::notice title=Cobertura $service::${pct}% de linhas cobertas ($covered/$total)"
              fi
            else
              echo "::warning title=JaCoCo $service::Relatório jacoco.csv não encontrado"
            fi
          done

  # ─────────────────────────────────────────────────────────
  # Job 2: Testes Selenium E2E
  # ─────────────────────────────────────────────────────────
  selenium:
    name: Selenium E2E
    runs-on: ubuntu-latest
    needs: testes

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Selenium E2E — produto-service
        run: mvn test -pl produto-service -Dgroups=selenium -DexcludedGroups= -Dspring.profiles.active=test -B

      - name: Selenium E2E — pedido-service
        run: mvn test -pl pedido-service -Dgroups=selenium -DexcludedGroups= -Dspring.profiles.active=test -B

      - name: Upload resultados Selenium
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-resultados
          path: |
            produto-service/target/surefire-reports/
            pedido-service/target/surefire-reports/

      - name: Resumo Selenium E2E
        if: always()
        run: |
          echo "## Testes Selenium E2E" >> $GITHUB_STEP_SUMMARY
          echo "| Serviço         | Passaram | Falharam | Erros | Ignorados |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------------|----------|----------|-------|-----------|" >> $GITHUB_STEP_SUMMARY
          for service in produto-service pedido-service; do
            dir="$service/target/surefire-reports"
            if ls "$dir"/TEST-*.xml 1>/dev/null 2>&1; then
              tests=$(grep -h 'tests="' "$dir"/TEST-*.xml | grep -oP 'tests="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
              failures=$(grep -h 'failures="' "$dir"/TEST-*.xml | grep -oP 'failures="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
              errors=$(grep -h 'errors="' "$dir"/TEST-*.xml | grep -oP 'errors="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
              skipped=$(grep -h 'skipped="' "$dir"/TEST-*.xml | grep -oP 'skipped="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
              passed=$((tests - failures - errors - skipped))
              echo "| $service | $passed | $failures | $errors | $skipped |" >> $GITHUB_STEP_SUMMARY
              if [ "$failures" -gt 0 ] || [ "$errors" -gt 0 ]; then
                echo "::warning title=Selenium $service::${failures} falha(s) e ${errors} erro(s) nos testes E2E"
              else
                echo "::notice title=Selenium $service::${passed} testes E2E passaram"
              fi
            else
              echo "| $service | — | — | — | sem relatório |" >> $GITHUB_STEP_SUMMARY
              echo "::warning title=Selenium $service::Nenhum relatório XML encontrado"
            fi
          done

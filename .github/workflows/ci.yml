name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Testes unitários, integração e cobertura JaCoCo
  # ─────────────────────────────────────────────────────────
  testes:
    name: Testes e Cobertura
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build e testes (todos os módulos)
        run: mvn verify -B

      - name: Publicar resultados dos testes
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Testes JUnit
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload relatório JUnit — produto-service
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-produto-service
          path: produto-service/target/surefire-reports/

      - name: Upload relatório JUnit — pedido-service
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-pedido-service
          path: pedido-service/target/surefire-reports/

      - name: Upload JaCoCo — produto-service
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-produto-service
          path: produto-service/target/site/jacoco/

      - name: Upload JaCoCo — pedido-service
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-pedido-service
          path: pedido-service/target/site/jacoco/

      - name: Resumo de cobertura JaCoCo
        if: always()
        run: |
          echo "## Cobertura JaCoCo" >> $GITHUB_STEP_SUMMARY
          for service in produto-service pedido-service; do
            csv="$service/target/site/jacoco/jacoco.csv"
            if [ -f "$csv" ]; then
              covered=$(tail -n +2 "$csv" | awk -F',' '{s+=$5} END {print s}')
              missed=$(tail -n +2  "$csv" | awk -F',' '{s+=$4} END {print s}')
              total=$((covered + missed))
              pct=$(awk "BEGIN {printf \"%.1f\", ($covered/$total)*100}")
              echo "- **$service**: $covered/$total linhas ($pct%)" >> $GITHUB_STEP_SUMMARY
              echo "::notice title=Cobertura $service::${pct}% de linhas cobertas ($covered/$total)"
            else
              echo "::warning title=JaCoCo $service::Relatório jacoco.csv não encontrado"
            fi
          done

  # ─────────────────────────────────────────────────────────
  # Job 2: Testes Selenium E2E com stack completa
  # ─────────────────────────────────────────────────────────
  selenium:
    name: Selenium E2E
    runs-on: ubuntu-latest
    needs: testes

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build das imagens Docker
        run: docker compose build

      - name: Subir stack completa
        run: |
          docker compose up -d \
            eureka-server produto-service pedido-service api-gateway \
            produto-db pedido-db

      - name: Aguardar api-gateway ficar saudável
        run: |
          echo "Aguardando serviços..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf http://localhost:8080/actuator/health \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "DOWN")
            echo "Tentativa $i: $STATUS"
            if [ "$STATUS" = "UP" ]; then
              echo "Stack disponível."
              break
            fi
            sleep 10
          done
          if [ "$STATUS" != "UP" ]; then
            echo "Stack não ficou disponível a tempo."
            docker compose logs
            exit 1
          fi

      - name: Selenium E2E — produto-service
        run: mvn test -pl produto-service -Dgroups=selenium -B

      - name: Selenium E2E — pedido-service
        run: mvn test -pl pedido-service -Dgroups=selenium -B

      - name: Upload resultados Selenium
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-resultados
          path: |
            produto-service/target/surefire-reports/
            pedido-service/target/surefire-reports/

      - name: Parar stack
        if: always()
        run: docker compose down -v

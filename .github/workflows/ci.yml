name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build e testes (todos os módulos)
        run: mvn verify -B

      - name: Upload JaCoCo — produto-service
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-produto-service
          path: produto-service/target/site/jacoco/
        if: always()

      - name: Upload JaCoCo — pedido-service
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-pedido-service
          path: pedido-service/target/site/jacoco/
        if: always()

      - name: Selenium E2E — produto-service
        run: mvn test -pl produto-service -Dgroups=selenium -B
        continue-on-error: true

      - name: Selenium E2E — pedido-service
        run: mvn test -pl pedido-service -Dgroups=selenium -B
        continue-on-error: true

      - name: Upload resultados Selenium — produto-service
        uses: actions/upload-artifact@v4
        with:
          name: selenium-produto-service
          path: produto-service/target/surefire-reports/
        if: always()

      - name: Upload resultados Selenium — pedido-service
        uses: actions/upload-artifact@v4
        with:
          name: selenium-pedido-service
          path: pedido-service/target/surefire-reports/
        if: always()

name: Security

on:
  push:
    branches: [master, main]
  schedule:
    - cron: '0 2 * * 1'  # toda segunda-feira às 02h UTC
  workflow_dispatch:

jobs:
  # ── SAST: Análise estática com CodeQL ────────────────────────────────────────
  codeql:
    name: Análise CodeQL (SAST)
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-and-quality

      - name: Compilar para análise (sem testes)
        run: |
          echo "::notice title=SAST::Iniciando análise estática com CodeQL"
          mvn compile -B -DskipTests

      - name: Executar análise CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: java

      - name: Resumo SAST
        if: always()
        run: |
          echo "## Análise SAST — CodeQL" >> $GITHUB_STEP_SUMMARY
          echo "| Campo        | Valor                                      |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|--------------------------------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Ferramenta** | GitHub CodeQL                            |" >> $GITHUB_STEP_SUMMARY
          echo "| **Linguagem**  | Java 21                                  |" >> $GITHUB_STEP_SUMMARY
          echo "| **Queries**    | security-and-quality                     |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resultados** | Security → Code scanning alerts          |" >> $GITHUB_STEP_SUMMARY
          echo "::notice title=SAST::Análise CodeQL concluída — verifique Security → Code scanning alerts"

  # ── DAST: Análise dinâmica com OWASP ZAP ─────────────────────────────────────
  dast:
    name: Análise OWASP ZAP (DAST)
    runs-on: ubuntu-latest
    needs: codeql

    permissions:
      contents: read
      security-events: write

    services:
      postgres-produto:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: produto_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-pedido:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pedido_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build produto-service e pedido-service (sem testes)
        run: |
          echo "::notice title=DAST::Compilando serviços para análise dinâmica"
          mvn package -pl produto-service,pedido-service -DskipTests -B -q

      - name: Iniciar produto-service (porta 8081)
        run: |
          # application-test.properties fica em src/test/resources e NÃO entra no jar.
          # Usamos args Spring Boot (--) para sobrescrever datasource com máxima precedência.
          java -jar produto-service/target/*.jar \
            --server.port=8081 \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/produto_db \
            --spring.datasource.driver-class-name=org.postgresql.Driver \
            --spring.datasource.username=postgres \
            --spring.datasource.password=postgres \
            --spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect \
            --spring.jpa.hibernate.ddl-auto=create-drop \
            --spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo \
            --eureka.client.enabled=false &
          echo "::debug::Aguardando startup do produto-service..."
          timeout 90 bash -c \
            'until curl -sf http://localhost:8081/actuator/health; do sleep 3; done'
          echo "::notice title=DAST::produto-service disponível em http://localhost:8081"

      - name: Iniciar pedido-service (porta 8082)
        run: |
          java -jar pedido-service/target/*.jar \
            --server.port=8082 \
            --spring.datasource.url=jdbc:postgresql://localhost:5433/pedido_db \
            --spring.datasource.driver-class-name=org.postgresql.Driver \
            --spring.datasource.username=postgres \
            --spring.datasource.password=postgres \
            --spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect \
            --spring.jpa.hibernate.ddl-auto=create-drop \
            --spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo \
            --eureka.client.enabled=false \
            --produto.service.url=http://localhost:8081 &
          echo "::debug::Aguardando startup do pedido-service..."
          timeout 90 bash -c \
            'until curl -sf http://localhost:8082/actuator/health; do sleep 3; done'
          echo "::notice title=DAST::pedido-service disponível em http://localhost:8082"

      - name: Ajustar permissões do workspace para o container ZAP
        # O container ZAP roda como usuário zaproxy (UID 1000) e precisa
        # escrever zap.yaml no workspace montado como volume.
        run: chmod a+w "$GITHUB_WORKSPACE"

      - name: OWASP ZAP Baseline Scan — produto-service
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8081'
          cmd_options: '-I'
          allow_issue_writing: false
          artifact_name: zap-report-produto

      - name: Mover relatório do produto-service
        if: always()
        run: |
          mv report_html.html zap-produto-report.html || true
          mv report_json.json zap-produto-report.json || true

      - name: OWASP ZAP Baseline Scan — pedido-service
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8082'
          cmd_options: '-I'
          allow_issue_writing: false
          artifact_name: zap-report-pedido

      - name: Mover relatório do pedido-service
        if: always()
        run: |
          mv report_html.html zap-pedido-report.html || true
          mv report_json.json zap-pedido-report.json || true

      - name: Upload relatórios ZAP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-reports-html
          path: |
            zap-produto-report.html
            zap-pedido-report.html
          retention-days: 14

      - name: Resumo DAST
        if: always()
        run: |
          echo "## Análise DAST — OWASP ZAP" >> $GITHUB_STEP_SUMMARY
          echo "- **Ferramenta:** OWASP ZAP Baseline Scan" >> $GITHUB_STEP_SUMMARY
          echo "| Serviço | Alvo | Artefato |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| produto-service | http://localhost:8081 | zap-report-produto |" >> $GITHUB_STEP_SUMMARY
          echo "| pedido-service  | http://localhost:8082 | zap-report-pedido  |" >> $GITHUB_STEP_SUMMARY
          echo "::notice title=DAST::Análise OWASP ZAP concluída para ambos os serviços — verifique os artefatos"

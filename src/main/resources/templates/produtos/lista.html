<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Produtos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="/css/global.css"/>
    <link rel="stylesheet" href="/css/list.css"/>
</head>
<body>

<!-- ── Topbar ───────────────────────────────────────────── -->
<nav class="topbar">
    <a class="topbar-brand" href="/produtos">
        <i class="bi bi-box-seam"></i>Gerenciador de Produtos
    </a>
    <div class="d-flex align-items-center gap-2">
        <a href="/pedidos" class="btn-new" style="background:#6366f1;">
            <i class="bi bi-clipboard2-check"></i>Pedidos
        </a>
        <a href="/produtos/novo" id="btn-novo-produto" class="btn-new">
            <i class="bi bi-plus"></i>Novo Produto
        </a>
    </div>
</nav>

<div class="main">

    <!-- Alertas -->
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>

    <!-- Tabela -->
    <div class="table-card">
        <div class="table-card-hd">
            <h4><i class="bi bi-list-ul me-2 text-primary"></i>Produtos</h4>
        </div>

        <div class="table-responsive-wrapper">
            <table class="ot" id="tabela-produtos">
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>SKU</th>
                    <th class="col-estoque">Estoque</th>
                    <th>Preço</th>
                    <th>Ativo</th>
                    <th class="text-center" style="width:160px;">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="produto : ${produtos}">
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <img th:if="${produto.imagemUrl}"
                                 th:src="${produto.imagemUrl}" th:alt="${produto.nome}"
                                 class="rounded border"
                                 style="width:40px; height:40px; object-fit:cover; flex-shrink:0;"/>
                            <div th:unless="${produto.imagemUrl}"
                                 class="rounded border bg-light d-flex align-items-center justify-content-center"
                                 style="width:40px; height:40px; flex-shrink:0; color:#9CA3AF;">
                                <i class="bi bi-image" style="font-size:.9rem;"></i>
                            </div>
                            <div>
                                <span class="fw-semibold" th:text="${produto.nome}"></span>
                                <small th:if="${produto.descricao}" class="d-block text-muted col-descricao"
                                       th:text="${produto.descricao}"></small>
                                <small th:if="${produto.categoria != null}"
                                       class="badge bg-light text-secondary border mt-1"
                                       th:text="${produto.categoria.label}"></small>
                            </div>
                        </div>
                    </td>
                    <td class="sku-cell" th:text="${produto.sku}"></td>
                    <td class="col-estoque" th:text="${produto.estoque}"></td>
                    <td class="valor-cell">
                        <span th:if="${produto.precoPromocional == null}">
                            R$ <span th:text="${#numbers.formatDecimal(produto.preco, 1, 'POINT', 2, 'COMMA')}"></span>
                        </span>
                        <span th:unless="${produto.precoPromocional == null}">
                            <del class="text-muted small">R$ <span th:text="${#numbers.formatDecimal(produto.preco, 1, 'POINT', 2, 'COMMA')}"></span></del><br>
                            <span class="text-success fw-bold">R$ <span th:text="${#numbers.formatDecimal(produto.precoPromocional, 1, 'POINT', 2, 'COMMA')}"></span></span>
                        </span>
                    </td>
                    <td>
                        <span th:if="${produto.ativo}" class="badge bg-success">Sim</span>
                        <span th:unless="${produto.ativo}" class="badge bg-secondary">Não</span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/produtos/{id}(id=${produto.id})}"
                           class="btn btn-sm btn-outline-secondary me-1" title="Detalhe">
                            <i class="bi bi-eye"></i>
                        </a>
                        <a th:href="@{/produtos/{id}/editar(id=${produto.id})}"
                           class="btn btn-sm btn-outline-warning me-1 btn-editar" title="Editar">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/produtos/{id}/excluir(id=${produto.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Tem certeza que deseja excluir este produto?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger btn-excluir" title="Excluir">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(produtos)}">
                    <td colspan="6">
                        <div class="empty-state">
                            <i class="bi bi-inbox display-5 d-block mb-2"></i>
                            <span>Nenhum produto cadastrado ainda.</span>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="table-footer" th:if="${!#lists.isEmpty(produtos)}">
            <span th:text="${#lists.size(produtos)} + ' produto(s) cadastrado(s)'"></span>
        </div>
    </div>

</div>

<footer class="app-footer">
    <i class="bi bi-box-seam"></i>
    <span>Sistema Loja</span>
    <span class="app-footer-dot">&bull;</span>
    <span>Infnet &copy; 2026</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pedido != null} ? 'Editar Pedido' : 'Novo Pedido'">Pedido</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="/pedidos/css/global.css"/>
    <link rel="stylesheet" href="/pedidos/css/form.css"/>
</head>
<body>

<div th:replace="~{fragments/layout :: topbar-mobile}"></div>
<div th:replace="~{fragments/layout :: sidebar('pedidos')}"></div>

<div class="main-wrapper">
<div class="main" style="max-width: 640px;">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/pedidos">Pedidos</a></li>
            <li class="breadcrumb-item active"
                th:text="${pedido != null} ? 'Editar' : 'Novo Pedido'">
            </li>
        </ol>
    </nav>

    <div class="form-card">

        <div class="d-flex align-items-center gap-2 mb-4">
            <h4 class="mb-0">
                <i th:class="${pedido != null} ? 'bi bi-pencil-square me-2' : 'bi bi-plus-circle me-2'"></i>
                <span th:text="${pedido != null} ? 'Editar Pedido' : 'Novo Pedido'"></span>
            </h4>
        </div>

        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${erro}"></span>
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="${pedido != null} ? @{/pedidos/{id}(id=${pedido.id})} : @{/pedidos}"
              method="post" novalidate>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label for="descricao" class="form-label">
                        Descrição <span class="text-danger">*</span>
                    </label>
                    <input type="text" id="descricao" name="descricao"
                           class="form-control form-control-lg" maxlength="255" required
                           placeholder="Descreva o pedido..."
                           th:value="${pedido?.descricao}"/>
                    <div class="form-text">Máximo 255 caracteres.</div>
                </div>
                <div class="col-md-6">
                    <label for="valor" class="form-label">
                        Valor (R$) <span class="text-danger">*</span>
                    </label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text">R$</span>
                        <input type="text" id="valor" name="valor"
                               class="form-control" required
                               placeholder="0,00"
                               th:value="${pedido?.valor}"/>
                    </div>
                    <div class="form-text">Use ponto ou vírgula como separador decimal. Mínimo: R$ 0,01.</div>
                </div>
            </div>

            <div class="mb-4">
                <label for="observacao" class="form-label">
                    Observação <span class="text-muted fw-normal small">(opcional)</span>
                </label>
                <textarea id="observacao" name="observacao"
                          class="form-control" rows="3" maxlength="500"
                          placeholder="Informações adicionais, instruções especiais..."
                          th:text="${pedido?.observacao}"></textarea>
                <div class="form-text">Máximo 500 caracteres.</div>
            </div>

            <div class="d-flex gap-2 flex-wrap">
                <button type="submit" class="btn-primary-custom btn">
                    <i th:class="${pedido != null} ? 'bi bi-floppy me-1' : 'bi bi-plus-lg me-1'"></i>
                    <span th:text="${pedido != null} ? 'Salvar Alterações' : 'Criar Pedido'"></span>
                </button>
                <a th:href="${pedido != null} ? @{/pedidos/{id}(id=${pedido.id})} : '/pedidos'"
                   class="btn-secondary-custom btn">
                    <i class="bi bi-x-lg me-1"></i>Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>function toggleSidebar(){document.querySelector('.sidebar').classList.toggle('open');}</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pedido != null} ? 'Editar Pedido' : 'Novo Pedido'">Pedido</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="/pedidos/css/global.css"/>
    <link rel="stylesheet" href="/pedidos/css/form.css"/>
</head>
<body>

<div th:replace="~{fragments/layout :: topbar-mobile}"></div>
<div th:replace="~{fragments/layout :: sidebar('pedidos')}"></div>

<div class="main-wrapper">
<div class="main" style="max-width: 900px;">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/pedidos">Pedidos</a></li>
            <li class="breadcrumb-item active"
                th:text="${pedido != null} ? 'Editar' : 'Novo Pedido'">
            </li>
        </ol>
    </nav>

    <div class="form-card">

        <div class="d-flex align-items-center gap-2 mb-4">
            <h4 class="mb-0">
                <i th:class="${pedido != null} ? 'bi bi-pencil-square me-2' : 'bi bi-plus-circle me-2'"></i>
                <span th:text="${pedido != null} ? 'Editar Observação' : 'Novo Pedido'"></span>
            </h4>
        </div>

        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${erro}"></span>
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
        </div>

        <!-- ── MODO CRIAÇÃO: grid de cards + carrinho lateral ───────────── -->
        <th:block th:if="${pedido == null}">
            <form th:action="@{/pedidos}" method="post" novalidate id="formNovoPedido">

                <div th:if="${#lists.isEmpty(produtos)}" class="alert alert-warning d-flex align-items-center gap-2 mb-4">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span>Nenhum produto disponível. <a href="/produtos/novo">Cadastre um produto</a> primeiro.</span>
                </div>

                <div th:unless="${#lists.isEmpty(produtos)}" class="row g-3 mb-4">

                    <!-- Catálogo (65%) -->
                    <div class="col-md-8">
                        <div class="search-wrap">
                            <i class="bi bi-search"></i>
                            <input type="text" id="busca-produto"
                                   class="form-control form-control-sm"
                                   placeholder="Buscar produto por nome ou SKU..."
                                   oninput="filtrarProdutos(this.value)"/>
                        </div>

                        <div class="produto-grid" id="grade-produtos">
                            <div class="produto-card" th:each="p : ${produtos}"
                                 th:attr="data-nome=${p.nome}, data-sku=${p.sku}">

                                <div th:if="${p.imagemUrl != null and !#strings.isEmpty(p.imagemUrl)}">
                                    <img class="card-img" th:src="${p.imagemUrl}"
                                         th:alt="${p.nome}" onerror="this.parentElement.innerHTML='<div class=\'card-img-placeholder\'><i class=\'bi bi-image\'></i></div>'"/>
                                </div>
                                <div th:if="${p.imagemUrl == null or #strings.isEmpty(p.imagemUrl)}"
                                     class="card-img-placeholder">
                                    <i class="bi bi-box-seam"></i>
                                </div>

                                <div class="card-nome" th:text="${p.nome}"></div>
                                <div class="card-sku" th:text="${p.sku}"></div>
                                <div class="card-preco"
                                     th:text="${'R$ ' + #numbers.formatDecimal(p.preco, 1, 'POINT', 2, 'COMMA')}"></div>

                                <input type="hidden" name="produtoIds" th:value="${p.id}"/>
                                <div class="qty-stepper">
                                    <button type="button" onclick="ajustarQty(this, -1)">−</button>
                                    <input type="number" name="quantidades"
                                           min="0" max="99" value="0"
                                           class="qty-input"
                                           th:attr="data-preco=${p.preco}, data-nome=${p.nome}"
                                           oninput="atualizarCarrinho()"/>
                                    <button type="button" onclick="ajustarQty(this, 1)">+</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Carrinho (35%) -->
                    <div class="col-md-4">
                        <div class="cart-panel">
                            <div class="cart-header">
                                <i class="bi bi-cart3"></i>Carrinho
                            </div>
                            <div class="cart-body" id="cart-items">
                                <p class="cart-vazio" id="cart-vazio-msg">Nenhum item selecionado</p>
                            </div>
                            <div class="cart-footer">
                                <span class="cart-total-label">Total estimado</span>
                                <span class="cart-total-valor" id="cart-total">R$ 0,00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="observacao" class="form-label">
                        Observação <span class="text-muted fw-normal small">(opcional)</span>
                    </label>
                    <textarea id="observacao" name="observacao"
                              class="form-control" rows="3" maxlength="500"
                              placeholder="Informações adicionais, instruções especiais..."></textarea>
                    <div class="form-text">Máximo 500 caracteres.</div>
                </div>

                <div class="d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn-primary-custom btn" id="btn-criar-pedido">
                        <i class="bi bi-plus-lg me-1"></i>Criar Pedido
                    </button>
                    <a href="/pedidos" class="btn-secondary-custom btn">
                        <i class="bi bi-x-lg me-1"></i>Cancelar
                    </a>
                </div>
            </form>
        </th:block>

        <!-- ── MODO EDIÇÃO: apenas observação ───────────────────────────── -->
        <th:block th:if="${pedido != null}">
            <form th:action="@{/pedidos/{id}(id=${pedido.id})}" method="post" novalidate>

                <!-- Resumo read-only do pedido -->
                <div class="mb-4 p-3 bg-light rounded border">
                    <div class="row g-2">
                        <div class="col-md-8">
                            <small class="text-muted d-block">Descrição (gerada automaticamente)</small>
                            <span class="fw-semibold" th:text="${pedido.descricao}"></span>
                        </div>
                        <div class="col-md-4 text-md-end">
                            <small class="text-muted d-block">Valor Total</small>
                            <strong class="text-success"
                                    th:text="${'R$ ' + #numbers.formatDecimal(pedido.calcularTotal(), 1, 'POINT', 2, 'COMMA')}"></strong>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="observacao" class="form-label">
                        Observação <span class="text-muted fw-normal small">(opcional)</span>
                    </label>
                    <textarea id="observacao" name="observacao"
                              class="form-control" rows="3" maxlength="500"
                              placeholder="Informações adicionais, instruções especiais..."
                              th:text="${pedido.observacao}"></textarea>
                    <div class="form-text">Máximo 500 caracteres.</div>
                </div>

                <div class="d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn-primary-custom btn">
                        <i class="bi bi-floppy me-1"></i>Salvar Observação
                    </button>
                    <a th:href="@{/pedidos/{id}(id=${pedido.id})}" class="btn-secondary-custom btn">
                        <i class="bi bi-x-lg me-1"></i>Cancelar
                    </a>
                </div>
            </form>
        </th:block>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>function toggleSidebar(){document.querySelector('.sidebar').classList.toggle('open');}</script>
<script>
    function ajustarQty(btn, delta) {
        var input = btn.parentElement.querySelector('input[type="number"]');
        var novoValor = Math.max(0, Math.min(99, (parseInt(input.value) || 0) + delta));
        input.value = novoValor;
        atualizarCarrinho();
        var card = btn.closest('.produto-card');
        if (card) card.classList.toggle('selecionado', novoValor > 0);
    }

    function atualizarCarrinho() {
        var itens = [];
        var total  = 0;

        document.querySelectorAll('.qty-input').forEach(function(inp) {
            var qty = parseInt(inp.value) || 0;
            if (qty > 0) {
                var preco = parseFloat(inp.dataset.preco) || 0;
                var sub   = qty * preco;
                total += sub;
                itens.push({ nome: inp.dataset.nome, qty: qty, preco: preco, sub: sub });
            }
            var card = inp.closest('.produto-card');
            if (card) card.classList.toggle('selecionado', qty > 0);
        });

        renderCarrinho(itens, total);
    }

    function renderCarrinho(itens, total) {
        var container = document.getElementById('cart-items');
        var vazioMsg  = document.getElementById('cart-vazio-msg');

        if (itens.length === 0) {
            container.innerHTML = '<p class="cart-vazio" id="cart-vazio-msg">Nenhum item selecionado</p>';
        } else {
            container.innerHTML = itens.map(function(it) {
                return '<div class="cart-item">' +
                    '<div><div class="cart-item-nome">' + escHtml(it.nome) + '</div>' +
                    '<div class="cart-item-info">' + it.qty + ' × R$ ' + fmt(it.preco) + '</div></div>' +
                    '<div class="cart-item-subtotal">R$ ' + fmt(it.sub) + '</div>' +
                    '</div>';
            }).join('');
        }

        document.getElementById('cart-total').textContent = 'R$ ' + fmt(total);
    }

    function filtrarProdutos(termo) {
        var t = termo.trim().toLowerCase();
        document.querySelectorAll('#grade-produtos .produto-card').forEach(function(card) {
            var nome = (card.dataset.nome || '').toLowerCase();
            var sku  = (card.dataset.sku  || '').toLowerCase();
            card.style.display = (!t || nome.includes(t) || sku.includes(t)) ? '' : 'none';
        });
    }

    function fmt(v) {
        return v.toFixed(2).replace('.', ',').replace(/(\d)(?=(\d{3})+,)/g, '$1.');
    }

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
</script>
</body>
</html>

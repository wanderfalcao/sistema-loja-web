spring.application.name=pedido-service
server.port=8082
spring.profiles.active=dev

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

rest.client.timeout.connect-ms=3000
rest.client.timeout.read-ms=5000

spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo
spring.mvc.static-path-pattern=/pedidos/**

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

produto.service.url=${PRODUTO_SERVICE_URL:http://localhost:8081}
app.produto.base-url=${APP_PRODUTO_BASE_URL:http://localhost:8081}

# Circuit Breaker — abre apos 50% de falhas em 10 chamadas; aguarda 30s antes de tentar novamente
resilience4j.circuitbreaker.instances.produto-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.produto-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.produto-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.produto-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.produto-service.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.produto-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.produto-service.recordExceptions[0]=org.springframework.web.client.ResourceAccessException
resilience4j.circuitbreaker.instances.produto-service.recordExceptions[1]=org.springframework.web.client.HttpServerErrorException
resilience4j.circuitbreaker.instances.produto-service.ignoreExceptions[0]=br.com.infnet.shared.exception.DomainException

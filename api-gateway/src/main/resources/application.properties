spring.application.name=api-gateway
server.port=8080
spring.profiles.active=dev

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

spring.cloud.gateway.discovery.locator.enabled=true
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# Rotas para os microsserviços
spring.cloud.gateway.routes[0].id=produto-service
spring.cloud.gateway.routes[0].uri=lb://produto-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/produtos/**,/produtos/**

spring.cloud.gateway.routes[1].id=pedido-service
spring.cloud.gateway.routes[1].uri=lb://pedido-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/pedidos/**,/pedidos/**

# Rotas para o Swagger/OpenAPI de cada serviço
spring.cloud.gateway.routes[2].id=produto-api-docs
spring.cloud.gateway.routes[2].uri=lb://produto-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/produto-service/api-docs/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[3].id=pedido-api-docs
spring.cloud.gateway.routes[3].uri=lb://pedido-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/pedido-service/api-docs/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# Swagger UI agregado — http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.urls[0].name=Produto Service
springdoc.swagger-ui.urls[0].url=/produto-service/api-docs
springdoc.swagger-ui.urls[1].name=Pedido Service
springdoc.swagger-ui.urls[1].url=/pedido-service/api-docs
springdoc.swagger-ui.urls-primary-name=Produto Service

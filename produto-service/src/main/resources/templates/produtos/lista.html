<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Produtos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="/produtos/css/global.css"/>
    <link rel="stylesheet" href="/produtos/css/list.css"/>
</head>
<body>

<div th:replace="~{fragments/layout :: topbar-mobile}"></div>
<div th:replace="~{fragments/layout :: sidebar('produtos')}"></div>

<div class="main-wrapper">
<div class="main">

    <div class="page-header">
        <h1 class="page-title"><i class="bi bi-box-seam me-2 text-primary"></i>Produtos</h1>
        <a href="/produtos/novo" id="btn-novo-produto" class="btn-new">
            <i class="bi bi-plus-lg"></i>Novo Produto
        </a>
    </div>

    <!-- Alertas -->
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>

    <!-- Tabela -->
    <div class="table-card">
        <div class="table-card-hd">

            <!-- Filtros -->
            <form method="get" action="/produtos" class="ms-auto d-flex align-items-center gap-2 flex-wrap">
                <input type="hidden" name="page" value="0"/>
                <div class="input-group input-group-sm" style="width:200px;">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" name="busca" class="form-control form-control-sm"
                           placeholder="Buscar por nome..." th:value="${busca}"/>
                </div>
                <select name="categoria" class="form-select form-select-sm" style="width:160px;" onchange="this.form.submit()">
                    <option value="" th:selected="${categoriaSelecionada == null}">Todas as categorias</option>
                    <option th:each="cat : ${categorias}"
                            th:value="${cat.name()}"
                            th:text="${cat.label}"
                            th:selected="${categoriaSelecionada != null and categoriaSelecionada.name() == cat.name()}"></option>
                </select>
                <button type="submit" class="btn btn-sm btn-primary">Filtrar</button>
                <a href="/produtos" class="btn btn-sm btn-outline-secondary">Limpar</a>
                <span class="text-muted small" th:text="${page.totalElements} + ' produto(s)'"></span>
            </form>
        </div>

        <div class="table-responsive-wrapper">
            <table class="ot" id="tabela-produtos">
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>SKU</th>
                    <th class="col-estoque">Estoque</th>
                    <th>Preço</th>
                    <th>Ativo</th>
                    <th class="text-center" style="width:160px;">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="produto : ${produtos}">
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <img th:if="${produto.imagemUrl}"
                                 th:src="${produto.imagemUrl}" th:alt="${produto.nome}"
                                 class="rounded border"
                                 style="width:40px; height:40px; object-fit:cover; flex-shrink:0;"/>
                            <div th:unless="${produto.imagemUrl}"
                                 class="rounded border bg-light d-flex align-items-center justify-content-center"
                                 style="width:40px; height:40px; flex-shrink:0; color:#9CA3AF;">
                                <i class="bi bi-image" style="font-size:.9rem;"></i>
                            </div>
                            <div>
                                <span class="fw-semibold" th:text="${produto.nome}"></span>
                                <small th:if="${produto.descricao}" class="d-block text-muted col-descricao"
                                       th:text="${produto.descricao}"></small>
                                <small th:if="${produto.categoria != null}"
                                       class="badge bg-light text-secondary border mt-1"
                                       th:text="${produto.categoria.label}"></small>
                            </div>
                        </div>
                    </td>
                    <td class="sku-cell" th:text="${produto.sku.codigo}"></td>
                    <td class="col-estoque" th:text="${produto.estoque.inteiro}"></td>
                    <td class="valor-cell">
                        <span th:if="${produto.precoPromocional == null}">
                            R$ <span th:text="${#numbers.formatDecimal(produto.preco.quantia, 1, 'POINT', 2, 'COMMA')}"></span>
                        </span>
                        <span th:unless="${produto.precoPromocional == null}">
                            <del class="text-muted small">R$ <span th:text="${#numbers.formatDecimal(produto.preco.quantia, 1, 'POINT', 2, 'COMMA')}"></span></del><br>
                            <span class="text-success fw-bold">R$ <span th:text="${#numbers.formatDecimal(produto.precoPromocional, 1, 'POINT', 2, 'COMMA')}"></span></span>
                        </span>
                    </td>
                    <td>
                        <span th:if="${produto.ativo}" class="badge bg-success">Sim</span>
                        <span th:unless="${produto.ativo}" class="badge bg-secondary">Não</span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/produtos/{id}(id=${produto.id})}"
                           class="btn btn-sm btn-outline-secondary me-1" title="Detalhe">
                            <i class="bi bi-eye"></i>
                        </a>
                        <a th:href="@{/produtos/{id}/editar(id=${produto.id})}"
                           class="btn btn-sm btn-outline-warning me-1 btn-editar" title="Editar">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/produtos/{id}/excluir(id=${produto.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Tem certeza que deseja excluir este produto?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger btn-excluir" title="Excluir">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(produtos)}">
                    <td colspan="6">
                        <div class="empty-state">
                            <i class="bi bi-inbox display-5 d-block mb-2"></i>
                            <span>Nenhum produto encontrado.</span>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- ── Paginação ──────────────────────────────── -->
        <div class="pagination-bar" th:if="${page.totalPages > 0}">

            <div class="pg-info"
                 th:with="first=${page.number * page.size + 1}, last=${page.number * page.size + page.numberOfElements}">
                <span th:text="${first}">1</span>–<span th:text="${last}">20</span> de <span th:text="${page.totalElements}">0</span>
            </div>

            <div class="pg-center">
                <div class="pg-group" th:if="${page.totalPages > 1}">
                    <a class="pg-btn pg-btn--arrow" th:classappend="${!page.hasPrevious()} ? 'pg-btn--off'"
                       th:href="@{/produtos(page=${page.number - 1},size=${page.size},busca=${busca},categoria=${categoriaSelecionada})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                    <a class="pg-btn" th:each="i : ${#numbers.sequence(pageStart, pageEnd)}"
                       th:classappend="${i == page.number} ? 'pg-btn--cur'"
                       th:href="@{/produtos(page=${i},size=${page.size},busca=${busca},categoria=${categoriaSelecionada})}"
                       th:text="${i + 1}">1</a>
                    <a class="pg-btn pg-btn--arrow" th:classappend="${!page.hasNext()} ? 'pg-btn--off'"
                       th:href="@{/produtos(page=${page.number + 1},size=${page.size},busca=${busca},categoria=${categoriaSelecionada})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </div>
            </div>

            <div class="pg-right">
                <span class="ctrl-label">Exibir</span>
                <div class="ctrl-wrap">
                    <select class="ctrl-select ctrl-select--sm"
                            th:attr="data-busca=${busca},data-cat=${categoriaSelecionada}"
                            onchange="location.href='/produtos?page=0&size='+this.value+(this.dataset.busca?'&busca='+encodeURIComponent(this.dataset.busca):'')+(this.dataset.cat?'&categoria='+this.dataset.cat:'')">
                        <option value="10"  th:selected="${page.size == 10}">10 por página</option>
                        <option value="20"  th:selected="${page.size == 20}">20 por página</option>
                        <option value="50"  th:selected="${page.size == 50}">50 por página</option>
                    </select>
                    <i class="bi bi-chevron-down ctrl-caret"></i>
                </div>
            </div>
        </div>

    </div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>function toggleSidebar(){document.querySelector('.sidebar').classList.toggle('open');}</script>
</body>
</html>
